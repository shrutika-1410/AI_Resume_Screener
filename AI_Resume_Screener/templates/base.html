<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "ATS" }}</title>
    <style>
      :root{
        --bg:#0b1220;
        --panel:#0f1b33;
        --panel2:#0c1730;
        --text:#e8eefc;
        --muted:#a9b4d0;
        --brand:#6d5efc;
        --brand2:#2dd4bf;
        --danger:#fb7185;
        --success:#34d399;
        --border:rgba(255,255,255,.08);
        --shadow:0 20px 60px rgba(0,0,0,.45);
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        background: radial-gradient(1200px 800px at 10% 0%, rgba(109,94,252,.25), transparent 60%),
                    radial-gradient(900px 600px at 90% 10%, rgba(45,212,191,.18), transparent 55%),
                    var(--bg);
        color:var(--text);
      }
      a{color:inherit; text-decoration:none}
      .container{max-width:1100px; margin:0 auto; padding:26px 18px 60px;}
      .topbar{
        position:sticky; top:0; z-index:10;
        background: rgba(11,18,32,.75);
        backdrop-filter: blur(10px);
        border-bottom:1px solid var(--border);
      }
      .topbar-inner{max-width:1100px; margin:0 auto; padding:16px 18px; display:flex; align-items:center; gap:14px;}
      .logo{
        width:38px; height:38px; border-radius:12px;
        background: linear-gradient(135deg, var(--brand), var(--brand2));
        box-shadow: 0 12px 30px rgba(109,94,252,.35);
      }
      .brand{font-weight:800; letter-spacing:.2px;}
      .pill{
        margin-left:auto;
        padding:10px 14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.03);
        border-radius:999px;
        color:var(--muted);
        font-size:13px;
      }
      .grid{display:grid; grid-template-columns: 1fr; gap:18px; margin-top:18px;}
      @media(min-width: 900px){
        .grid{grid-template-columns: 1.1fr .9fr;}
      }
      .card{
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        border:1px solid var(--border);
        border-radius:16px;
        box-shadow: var(--shadow);
      }
      .card .card-h{padding:18px 18px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
      .card .card-b{padding:18px;}
      .title{font-size:18px; font-weight:800;}
      .subtitle{color:var(--muted); font-size:13px; margin-top:6px;}
      .btn{
        display:inline-flex; align-items:center; justify-content:center;
        gap:10px;
        padding:12px 14px;
        border-radius:12px;
        border:1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.06);
        color:var(--text);
        font-weight:700;
        cursor:pointer;
        transition: transform .06s ease, background .12s ease;
      }
      .btn:hover{background: rgba(255,255,255,.09)}
      .btn:active{transform: translateY(1px)}
      .btn-primary{
        border:0;
        background: linear-gradient(135deg, var(--brand), var(--brand2));
        box-shadow: 0 14px 40px rgba(109,94,252,.25);
      }
      input[type="text"], input[type="email"], input[type="file"]{
        width:100%;
        padding:12px;
        border-radius:12px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.15);
        color:var(--text);
        outline:none;
      }
      label{font-weight:700; color:var(--muted); font-size:13px; display:block; margin-bottom:8px;}
      .field{margin-bottom:14px;}
      .small{color:var(--muted); font-size:12px; line-height:1.4;}
      table{width:100%; border-collapse: collapse;}
      th, td{padding:12px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top;}
      th{font-size:12px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:.06em;}
      .score{
        display:inline-flex; align-items:center; justify-content:center;
        padding:7px 10px; border-radius:999px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.04);
        font-weight:900;
      }
      .tag{
        display:inline-flex; padding:6px 10px; border-radius:999px;
        border:1px solid var(--border); background: rgba(255,255,255,.03);
        color:var(--muted); font-weight:700; font-size:12px;
      }
      .rec-list{list-style:none; padding:0; margin:10px 0 0;}
      .rec{
        border:1px solid var(--border);
        background: rgba(255,255,255,.03);
        border-radius:14px;
        padding:10px 12px;
        margin-top:10px;
      }
      .rec-title{font-weight:900;}
      .rec-meta{color:var(--muted); font-size:12px; margin-top:4px;}
      .footer-links{margin-top:18px; color:var(--muted); font-size:12px;}
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <div class="logo"></div>
        <div>
          <div class="brand">AstraATS</div>
          <div class="small">AI Resume Screener</div>
        </div>
        <div class="pill">Upload • Extract Skills • Recommend Jobs</div>
      </div>
    </div>

    <div class="container">
      {% block content %}{% endblock %}
      <div class="footer-links">Built for demos & interviews • Upload resumes to evaluate matches</div>
    </div>
  </body>
</html>
